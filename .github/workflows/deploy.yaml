name: Production Docker Deploy

on:
  push:
    branches: [production]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    environment: rubik-env

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Build & push backend image
        run: |
          docker build \
            -f server/docker/backend.Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/openanalytics-backend2:latest \
            .
          docker push ghcr.io/${{ github.repository_owner }}/openanalytics-backend2:latest

      - name: Build & push frontend image
        run: |
          docker build \
            -f server/docker/frontend.Dockerfile \
            --build-arg VITE_API_BASE_URL=https://api.openanalytics.co.in/api/v1 \
            --build-arg VITE_UPSTOX_REDIRECT_URL=https://openanalytics.co.in/connections/upstox/callback \
            -t ghcr.io/${{ github.repository_owner }}/openanalytics-frontend2:latest \
            .
          docker push ghcr.io/${{ github.repository_owner }}/openanalytics-frontend2:latest

  deploy-production:
    name: Deploy Production Docker Stack
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: rubik-env

    steps:
      - name: Pull latest images and restart production stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          password: ${{ secrets.PROD_SSH_PASSWORD }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ vars.PROD_APP_DIR || '/home/rubik/Open-Analytics' }}"
            cd "$APP_DIR"

            git fetch origin production
            git checkout production
            git reset --hard origin/production

            cd server/docker

            if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME || github.repository_owner }}" --password-stdin
            fi

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            $COMPOSE pull backend frontend
            $COMPOSE up -d --remove-orphans
            docker image prune -f
            $COMPOSE ps
