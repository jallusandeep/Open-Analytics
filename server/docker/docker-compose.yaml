
services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: ${BACKEND_CONTAINER_NAME}
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      DATA_DIR: ${DATA_DIR}
      DATABASE_URL: ${DATABASE_URL}
      DUCKDB_PATH: ${DUCKDB_PATH}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_SYSTEM_SECRET_KEY: ${JWT_SYSTEM_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      IDLE_TIMEOUT_MINUTES: ${IDLE_TIMEOUT_MINUTES}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - ${DATA_VOLUME}:/app/data
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - rubik-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres:
    image: postgres:15-alpine
    container_name: openanalytics_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - rubik-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: ${FRONTEND_CONTAINER_NAME}
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      NODE_ENV: ${NODE_ENV}
      VITE_UPSTOX_REDIRECT_URL: ${VITE_UPSTOX_REDIRECT_URL}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - rubik-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    command:
      - --label-enable
      - --interval
      - ${WATCHTOWER_POLL_INTERVAL:-60}
      - --cleanup
      - --rolling-restart
      - --include-restarting
      - ${BACKEND_CONTAINER_NAME}
      - ${FRONTEND_CONTAINER_NAME}
    # Mount the Docker socket so watchtower can interact with the Docker daemon
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.44
      - REPO_USER=${GHCR_USERNAME:-}
      - REPO_PASS=${GHCR_TOKEN:-}
    restart: unless-stopped

networks:
  rubik-network:
    driver: bridge

volumes:
  postgres_data:
